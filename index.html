    <script>
        (function() {
            const isGitHubPages = window.location.hostname === 'play.pvzge.com';

            if (isGitHubPages) {
                // 加载 Google Analytics
                const gtagScript = document.createElement('script');
                gtagScript.async = true;
                gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=GTM-NF3WJVC';
                document.head.appendChild(gtagScript);

                window.dataLayer = window.dataLayer || [];

                function gtag() {
                    dataLayer.push(arguments);
                }
                gtag('js', new Date());
                gtag('config', 'GTM-NF3WJVC');

                const adsenseScript = document.createElement('script');
                adsenseScript.async = true;
                adsenseScript.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2556694013784619';
                adsenseScript.crossOrigin = 'anonymous';
                document.head.appendChild(adsenseScript);

                const fundingScript = document.createElement('script');
                fundingScript.async = true;
                fundingScript.src = 'https://fundingchoicesmessages.google.com/i/pub-2556694013784619?ers=1';
                document.head.appendChild(fundingScript);

                (function() {
                    function signalGooglefcPresent() {
                        if (!window.frames['googlefcPresent']) {
                            if (document.body) {
                                const iframe = document.createElement('iframe');
                                iframe.style = 'width: 0; height: 0; border: none; z-index: -1000; left: -1000px; top: -1000px;';
                                iframe.style.display = 'none';
                                iframe.name = 'googlefcPresent';
                                document.body.appendChild(iframe);
                            } else {
                                setTimeout(signalGooglefcPresent, 0);
                            }
                        }
                    }
                    signalGooglefcPresent();
                })();
            }
        })();
    </script>
